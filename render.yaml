services:
  - type: web
    name: medplaner-server
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: BOT_MODE
        value: webhook
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: APP_URL
        sync: false
      - key: MINIAPP_URL
        sync: false
      - key: ALLOWED_ORIGIN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: YANDEX_CLIENT_ID
        sync: false
      - key: YANDEX_CLIENT_SECRET
        sync: false
      - key: ENCRYPT_KEY
        sync: false
